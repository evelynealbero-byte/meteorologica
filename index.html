<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>App Meteorologica</title>
  </head>
  <body>
    <div class="weather-app">
    <header>
     <form class="form-search">
        <input type = "search" placeholder = "Enter a city name" required class="form-search-input" />
        <input type = "submit" value="Search" class=" form-search-button"/>
     </form>
    </header>
    <main>
        <div class = "weather-app-data">
        <div>
            <h1 class="weather-app-city">Paris</h1>
            <p class=" weather-app-details"> Tuesday 14:49, Sunny
                <br/>
                Humidity: 66% , Wind 2.18 <km>
            </p>
        </div>
        <div class="weather-app-temperature-container"> <div class="weather-app-icon">☀️</div> <div class="weather-app-temperature">12</div> </div>
        </div> <div class="weather-app-unit">°C</div>
    </main>
    <footer>
      Coded by
      <a href="https://github.com/evelynealbero-byte" target="_blank"
        >Evelyne Albero</a
      >, is open-sourced on
      <a
        href="https://github.com/evelynealbero-byte/meteorologica"
        target="_blank"
        >GitHub</a
      >
      and hosted on
      <a href="https://meteorologica.netlify.app/" target="_blank">Netlify</a>.
    </footer>
    </div>
  </body>
</html>
